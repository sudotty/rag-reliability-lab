  <text x="96" y="120" font-family="Arial" font-size="34" font-weight="700" fill="#24292f">RAG Reliability Lab</text>
  <text x="96" y="160" font-family="Arial" font-size="18" fill="#57606a">Documents → Chunks → Search Comparison → Answer Sources → Metrics → Saved Cases</text>
  <g font-family="Arial" font-size="18" fill="#24292f">
    <rect x="96" y="220" width="160" height="92" rx="14" fill="#f6f8fa" stroke="#d0d7de"/><text x="126" y="272">Documents</text>
